<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Nails ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff6eb4;
    --lilac: #c084fc;
    --peach: #ffb085;
    --mint: #6ee7b7;
    --cream: #fff8f0;
    --dark: #2d1b33;
    --card-w: 140px;
    --card-h: 200px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 10% 20%, #ffd6f0aa, transparent),
      radial-gradient(ellipse 500px 500px at 90% 80%, #ddd6feaa, transparent),
      radial-gradient(ellipse 400px 300px at 50% 50%, #fff0e0aa, transparent);
    z-index: 0; pointer-events: none;
  }

  .sparkle {
    position: fixed; pointer-events: none; z-index: 0;
    font-size: 1.4rem;
    animation: floatUp 6s ease-in-out infinite; opacity: 0.35;
  }
  @keyframes floatUp {
    0%,100% { transform: translateY(0) rotate(0deg); opacity: .3; }
    50% { transform: translateY(-18px) rotate(20deg); opacity: .6; }
  }

  header {
    position: relative; z-index: 10;
    text-align: center; padding: 2.5rem 1rem 1rem;
  }
  header h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(2.4rem, 6vw, 4rem);
    background: linear-gradient(135deg, var(--pink), var(--lilac), var(--peach));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 2px 8px #ff6eb455); letter-spacing: 1px;
  }
  header p { color: #9d6c8a; font-size: 1rem; margin-top: .4rem; font-weight: 600; }

  #progress-bar {
    position: relative; z-index: 10;
    display: flex; justify-content: center; gap: .5rem;
    flex-wrap: wrap; padding: 1rem 1rem .5rem;
  }
  .pill {
    display: flex; align-items: center; gap: .35rem;
    padding: .3rem .75rem; border-radius: 999px;
    font-size: .75rem; font-weight: 700;
    background: white; border: 2px solid #eac0d8; color: #b07090;
    transition: all .3s;
  }
  .pill.active { background: var(--pink); border-color: var(--pink); color: white; transform: scale(1.08); }
  .pill.done  { background: var(--lilac); border-color: var(--lilac); color: white; }

  #theme-title {
    position: relative; z-index: 10;
    text-align: center; padding: 1.5rem 1rem .5rem;
  }
  #theme-title h2 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.4rem, 4vw, 2rem); color: var(--dark);
    opacity: 0; transform: translateY(10px); transition: all .5s ease;
  }
  #theme-title h2.show { opacity: 1; transform: none; }
  #theme-title p {
    color: #b07090; font-size: .85rem; margin-top: .3rem; font-weight: 600;
    opacity: 0; transition: opacity .5s .2s;
  }
  #theme-title p.show { opacity: 1; }

  #cards-zone {
    position: relative; z-index: 10;
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 1.2rem; padding: 1.5rem 1rem 2rem; min-height: 260px;
  }

  .card-wrap {
    perspective: 900px; width: var(--card-w); height: var(--card-h);
    cursor: pointer; transition: transform .2s;
  }
  .card-wrap:hover:not(.flipped):not(.locked) { transform: translateY(-6px) scale(1.04); }
  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-wrap.locked { cursor: default; opacity: .55; filter: grayscale(.4); }

  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .55s cubic-bezier(.4,0,.2,1);
  }

  .card-front, .card-back {
    position: absolute; inset: 0; border-radius: 18px;
    backface-visibility: hidden;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 1rem .75rem; gap: .5rem;
  }

  .card-back {
    background: linear-gradient(145deg, #fce4f3, #f0e6ff);
    border: 3px solid white;
    box-shadow: 0 6px 20px #d472aa44;
    overflow: hidden;
    padding: 0;
  }
  .card-back::before { display: none; }
  .card-back .nail-icon { display: none; }
  .card-back svg {
    width: 100%; height: 100%;
    position: absolute; inset: 0;
  }

  .card-front {
    transform: rotateY(180deg);
    border: 3px solid white; box-shadow: 0 8px 24px rgba(0,0,0,.12);
    text-align: center; overflow: hidden; gap: .4rem;
  }
  .card-front .card-emoji { font-size: 2.6rem; }
  .card-front .card-label {
    font-family: 'Pacifico', cursive; font-size: .82rem; color: white;
    text-shadow: 0 1px 4px rgba(0,0,0,.25); line-height: 1.2; word-break: break-word;
  }
  .card-front .card-visual {
    width: 100%; flex: 1;
    display: flex; align-items: center; justify-content: center; position: relative;
  }

  .card-wrap.selected .card-front {
    box-shadow: 0 0 0 4px white, 0 0 0 7px var(--pink), 0 12px 32px #ff6eb455;
  }
  .card-wrap.selected .card-inner { transform: rotateY(180deg) scale(1.06); }

  #next-btn {
    display: block; position: relative; z-index: 10;
    margin: 0 auto 2rem; padding: .85rem 2.5rem;
    font-family: 'Pacifico', cursive; font-size: 1.1rem; color: white;
    background: linear-gradient(135deg, var(--pink), var(--lilac));
    border: none; border-radius: 999px; cursor: pointer;
    box-shadow: 0 6px 20px #ff6eb455; transition: all .25s;
    opacity: 0; pointer-events: none; transform: translateY(10px);
  }
  #next-btn.visible { opacity: 1; pointer-events: all; transform: none; }
  #next-btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 28px #c084fc66; }

  #result-screen {
    display: none; position: relative; z-index: 10;
    max-width: 700px; margin: 0 auto; padding: 2rem 1rem 4rem; text-align: center;
  }
  #result-screen h2 {
    font-family: 'Pacifico', cursive; font-size: 2rem;
    background: linear-gradient(135deg, var(--pink), var(--lilac));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 1.5rem;
  }
  .result-grid {
    display: flex; flex-wrap: wrap; gap: 1rem;
    justify-content: center; margin-bottom: 2rem;
  }
  .result-card {
    background: white; border-radius: 16px; padding: .75rem 1.1rem;
    border: 2.5px solid; display: flex; align-items: center; gap: .6rem;
    font-weight: 700; font-size: .9rem; color: var(--dark);
    box-shadow: 0 4px 14px rgba(0,0,0,.08);
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { opacity:0; transform: scale(.6) rotate(-4deg); }
    to   { opacity:1; transform: none; }
  }
  .result-card .rc-emoji { font-size: 1.4rem; }
  .result-card .rc-label { font-size: .7rem; color: #b07090; display: block; font-weight: 600; }

  #restart-btn {
    padding: .85rem 2.5rem; font-family: 'Pacifico', cursive; font-size: 1.1rem; color: white;
    background: linear-gradient(135deg, #6ee7b7, #60a5fa);
    border: none; border-radius: 999px; cursor: pointer;
    box-shadow: 0 6px 20px #6ee7b755; transition: all .25s;
  }
  #restart-btn:hover { transform: translateY(-3px) scale(1.05); }

  .nail-svg { width: 65px; height: 90px; }

  .confetti-piece {
    position: fixed; width: 10px; height: 10px; border-radius: 2px;
    pointer-events: none; z-index: 9999; animation: confettiFall 1.5s ease-in forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-60px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ══ ADMIN ══ */
  #admin-btn {
    position: fixed; top: 1rem; right: 1rem; z-index: 1000;
    background: white; border: 2px solid #fce7f3; border-radius: 50%;
    width: 44px; height: 44px; font-size: 1.25rem; cursor: pointer;
    box-shadow: 0 4px 14px rgba(200,100,170,.2); transition: all .25s;
    display: flex; align-items: center; justify-content: center;
  }
  #admin-btn:hover { transform: rotate(40deg) scale(1.12); box-shadow: 0 6px 20px rgba(200,100,170,.35); }

  #admin-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(45,27,51,.5); backdrop-filter: blur(4px); z-index: 2000;
  }
  #admin-overlay.open { display: block; }

  #admin-panel {
    display: none; position: fixed; top: 0; right: 0;
    width: min(460px, 100vw); height: 100vh; background: white; z-index: 2001;
    flex-direction: column; box-shadow: -8px 0 40px rgba(45,27,51,.18);
    overflow: hidden; animation: slideIn .3s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: none; } }
  #admin-panel.open { display: flex; }

  #admin-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 1.5rem;
    background: linear-gradient(135deg, var(--pink), var(--lilac));
    color: white; font-family: 'Pacifico', cursive; font-size: 1.1rem; flex-shrink: 0;
  }
  #admin-close {
    background: rgba(255,255,255,.25); border: none; color: white;
    font-size: 1.1rem; border-radius: 50%; width: 32px; height: 32px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s;
  }
  #admin-close:hover { background: rgba(255,255,255,.45); }

  #admin-body { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: .75rem; }

  .admin-cat { background: #fff8f0; border: 2px solid #fce7f3; border-radius: 16px; overflow: hidden; }
  .admin-cat-header {
    display: flex; align-items: center; gap: .6rem; padding: .75rem 1rem;
    background: linear-gradient(135deg, #fff0f8, #f5f0ff); cursor: pointer; user-select: none;
  }
  .admin-cat-header:hover { background: linear-gradient(135deg, #ffe4f3, #ede9fe); }
  .admin-emoji-btn {
    font-size: 1.3rem; cursor: pointer; border: none; background: none;
    padding: .1rem .3rem; border-radius: 6px; transition: background .15s; flex-shrink: 0;
  }
  .admin-emoji-btn:hover { background: rgba(236,72,153,.15); }
  .admin-cat-name {
    flex: 1; font-weight: 800; font-size: .95rem; color: var(--dark);
    background: none; border: none; font-family: 'Nunito', sans-serif;
    padding: .15rem .35rem; border-radius: 6px; transition: background .15s; min-width: 0;
  }
  .admin-cat-name:focus { outline: none; background: white; box-shadow: 0 0 0 2px var(--pink); }
  .admin-cat-toggle { font-size: .75rem; color: #b07090; flex-shrink: 0; }
  .admin-cat-del {
    background: none; border: none; color: #f87171; cursor: pointer;
    font-size: 1rem; padding: .2rem .4rem; border-radius: 6px; transition: background .15s; flex-shrink: 0;
  }
  .admin-cat-del:hover { background: #fee2e2; }

  .admin-cat-body { padding: .75rem 1rem 1rem; display: flex; flex-direction: column; gap: .45rem; }
  .admin-cat-body.collapsed { display: none; }

  .admin-card-row {
    display: flex; align-items: center; gap: .5rem;
    background: white; border-radius: 10px; padding: .4rem .65rem;
    border: 1.5px solid #fce7f3; transition: border-color .15s;
  }
  .admin-card-row:hover { border-color: var(--pink); }
  .admin-card-emoji {
    font-size: 1.2rem; cursor: pointer; border: 1.5px solid #fce7f3;
    border-radius: 8px; padding: .15rem .3rem; background: #fff8f0;
    font-family: inherit; min-width: 38px; text-align: center; transition: border-color .15s;
  }
  .admin-card-emoji:focus { outline: none; border-color: var(--pink); }
  .admin-card-label {
    flex: 1; border: none; background: none;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .88rem; color: var(--dark); min-width: 0;
  }
  .admin-card-label:focus { outline: none; }
  .admin-card-del {
    background: none; border: none; color: #fca5a5; cursor: pointer;
    font-size: .9rem; padding: .2rem .35rem; border-radius: 6px; transition: all .15s; flex-shrink: 0;
  }
  .admin-card-del:hover { color: #ef4444; background: #fee2e2; }

  .admin-add-card {
    align-self: flex-start; background: none;
    border: 1.5px dashed #f9a8d4; color: #ec4899;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .82rem;
    padding: .3rem .8rem; border-radius: 999px; cursor: pointer; transition: all .2s;
  }
  .admin-add-card:hover { background: #fce7f3; border-color: var(--pink); }

  .admin-add-cat {
    background: linear-gradient(135deg, var(--pink), var(--lilac));
    color: white; border: none; font-family: 'Pacifico', cursive; font-size: .9rem;
    padding: .7rem 1.5rem; border-radius: 999px; cursor: pointer; align-self: center;
    box-shadow: 0 4px 14px rgba(192,132,252,.35); transition: all .25s; margin-top: .5rem;
  }
  .admin-add-cat:hover { transform: translateY(-2px) scale(1.04); }

  #admin-save-bar {
    padding: .9rem 1.5rem; background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    border-top: 2px solid #6ee7b7; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; gap: .75rem;
  }
  #admin-reset-btn {
    background: none; border: 1.5px solid #6ee7b7; color: #065f46;
    font-family: 'Nunito', sans-serif; font-weight: 700; font-size: .8rem;
    padding: .45rem 1rem; border-radius: 999px; cursor: pointer; transition: all .2s;
  }
  #admin-reset-btn:hover { background: rgba(16,185,129,.15); }
  #admin-save-btn {
    background: #10b981; color: white; border: none;
    font-family: 'Pacifico', cursive; font-size: .88rem;
    padding: .55rem 1.4rem; border-radius: 999px; cursor: pointer;
    transition: all .2s; box-shadow: 0 3px 10px rgba(16,185,129,.3);
  }
  #admin-save-btn:hover { background: #059669; transform: scale(1.05); }
  #admin-save-btn.saved { background: #059669; }
  .storage-badge {
    position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
    background: #10b981; color: white; border-radius: 999px;
    padding: .5rem 1.2rem; font-weight: 700; font-size: .82rem;
    z-index: 9999; box-shadow: 0 4px 16px rgba(16,185,129,.4);
    animation: badgePop .3s cubic-bezier(.34,1.56,.64,1) both;
    pointer-events: none;
  }
  @keyframes badgePop {
    from { opacity:0; transform: translateX(-50%) scale(.8); }
    to   { opacity:1; transform: translateX(-50%) scale(1); }
  }

  #emoji-picker {
    position: fixed; z-index: 3000; background: white; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(45,27,51,.2); border: 2px solid #fce7f3;
    padding: .75rem; display: none; flex-direction: column; gap: .5rem; width: 260px;
  }
  #emoji-picker.open { display: flex; }
  #emoji-search {
    border: 1.5px solid #fce7f3; border-radius: 8px; padding: .4rem .65rem;
    font-family: 'Nunito', sans-serif; font-size: .85rem; width: 100%;
  }
  #emoji-search:focus { outline: none; border-color: var(--pink); }
  #emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: .2rem; max-height: 160px; overflow-y: auto; }
  .eopt {
    font-size: 1.2rem; text-align: center; cursor: pointer;
    padding: .2rem; border-radius: 6px; border: none; background: none; transition: background .1s;
  }
  .eopt:hover { background: #fce7f3; }
</style>
</head>
<body>

<!-- Floating sparkles -->
<div class="sparkle" style="left:5%;top:15%;animation-delay:0s">💅</div>
<div class="sparkle" style="left:90%;top:10%;animation-delay:1.2s">✨</div>
<div class="sparkle" style="left:80%;top:60%;animation-delay:2.4s">💎</div>
<div class="sparkle" style="left:12%;top:70%;animation-delay:.8s">🌸</div>
<div class="sparkle" style="left:50%;top:5%;animation-delay:3s">⭐</div>
<div class="sparkle" style="left:65%;top:85%;animation-delay:1.8s">🦋</div>

<header>
  <h1>✨ Random Nails ✨</h1>
  <p>Laisse le destin choisir ton prochain nail art 💅</p>
</header>
<button id="admin-btn" title="Administration">⚙️</button>

<div id="progress-bar"></div>

<div id="theme-title">
  <h2 id="theme-h2"></h2>
  <p id="theme-sub"></p>
</div>

<div id="cards-zone"></div>

<button id="next-btn">Suivant →</button>

<div id="result-screen">
  <h2>✨ Ton Nail Art ✨</h2>
  <div class="result-grid" id="result-grid"></div>
  <button id="restart-btn" onclick="restart()">Rejouer 🎲</button>
</div>

<!-- ═══ ADMIN MODAL ═══ -->
<div id="admin-overlay" onclick="closeAdmin()"></div>
<div id="admin-panel">
  <div id="admin-header">
    <span>⚙️ Administration</span>
    <button id="admin-close">✕</button>
  </div>
  <div id="admin-body">
    <div id="admin-cats-list"></div>
    <button class="admin-add-cat" id="admin-add-cat-btn">＋ Nouvelle catégorie</button>
  </div>
  <div id="admin-save-bar">
    <button id="admin-reset-btn" title="Remettre les paramètres par défaut">🔄 Défaut</button>
    <button id="admin-save-btn">Sauvegarder ✓</button>
  </div>
</div>

<!-- Emoji picker -->
<div id="emoji-picker">
  <input id="emoji-search" placeholder="Rechercher…"/>
  <div id="emoji-grid"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const THEMES = [
  {
    id: 'longueur',
    label: 'Longueur',
    emoji: '📏',
    subtitle: 'Quelle longueur pour tes ongles ?',
    single: true,
    cards: [
      { label: 'Court', emoji: '🤏', bg: ['#ffe0f0','#ffc5df'], draw: drawCourt },
      { label: 'Moyen', emoji: '✋', bg: ['#ffd6b3','#ffb07a'], draw: drawMoyen },
      { label: 'Long',  emoji: '💅', bg: ['#c9b8ff','#a78bfa'], draw: drawLong  },
    ]
  },
  {
    id: 'forme',
    label: 'Forme',
    emoji: '💎',
    subtitle: 'Quelle forme pour tes ongles ?',
    single: true,
    cards: [
      { label: 'Amande',    emoji: '🌸', bg: ['#ffd6e8','#ffb3d1'], draw: drawAmande },
      { label: 'Rond',      emoji: '🔵', bg: ['#b3e8ff','#7dd3fc'], draw: drawRond },
      { label: 'Carré',     emoji: '⬛', bg: ['#d4d4d4','#a8a8a8'], draw: drawCarre },
      { label: 'Ballerine', emoji: '🩰', bg: ['#fce7f3','#fbcfe8'], draw: drawBallerine },
      { label: 'Pointu',    emoji: '🔺', bg: ['#ffe4b5','#fcd34d'], draw: drawPointu },
    ]
  },
  {
    id: 'couleur',
    label: 'Couleur',
    emoji: '🎨',
    subtitle: 'Quelle palette de couleurs ?',
    single: true,
    cards: [
      { label: 'Rouge',  emoji: '🌹', bg: ['#fecaca','#f87171'], colors:['#ef4444','#b91c1c'], draw: drawColorNail },
      { label: 'Rose',   emoji: '🌸', bg: ['#fce7f3','#fbcfe8'], colors:['#ec4899','#db2777'], draw: drawColorNail },
      { label: 'Bleu',   emoji: '💙', bg: ['#dbeafe','#93c5fd'], colors:['#3b82f6','#1d4ed8'], draw: drawColorNail },
      { label: 'Vert',   emoji: '🌿', bg: ['#d1fae5','#6ee7b7'], colors:['#10b981','#047857'], draw: drawColorNail },
      { label: 'Violet', emoji: '💜', bg: ['#ede9fe','#c4b5fd'], colors:['#8b5cf6','#6d28d9'], draw: drawColorNail },
      { label: 'Nude',   emoji: '🍑', bg: ['#fde8d8','#f9c5a4'], colors:['#d4a484','#b8865c'], draw: drawColorNail },
      { label: 'Noir',   emoji: '🖤', bg: ['#374151','#1f2937'], colors:['#111827','#000000'], draw: drawColorNail },
      { label: 'Blanc',  emoji: '🤍', bg: ['#f8fafc','#e2e8f0'], colors:['#ffffff','#d1d5db'], draw: drawColorNail },
    ]
  },
  {
    id: 'intensite',
    label: 'Intensité',
    emoji: '🌈',
    subtitle: 'Quelle intensité de couleur ?',
    single: true,
    cards: [
      { label: 'Clair',  emoji: '🌤️', bg: ['#fef9c3','#fde68a'], draw: drawClair },
      { label: 'Foncé',  emoji: '🌑', bg: ['#374151','#1f2937'], draw: drawFonce },
      { label: 'Flashy', emoji: '⚡', bg: ['#ff6eb4','#ff3d9a'], draw: drawFlashy },
    ]
  },
  {
    id: 'finition',
    label: 'Finition',
    emoji: '✨',
    subtitle: 'Quel style de finition ?',
    single: true,
    cards: [
      { label: 'Chrome',    emoji: '🪞', bg: ['#e2e8f0','#94a3b8'], draw: drawChrome },
      { label: 'Irisé',     emoji: '🌈', bg: ['#fdf4ff','#f5d0fe'], draw: drawIrise },

// ─── DRAW FUNCTIONS (SVG inline) ────────────────────────────────────────────
function nailPath(shape, w, h) {
  switch(shape) {
    case 'round':   return `M${w*.2},${h*.5} Q${w*.2},${h*.1} ${w*.5},${h*.1} Q${w*.8},${h*.1} ${w*.8},${h*.5} L${w*.8},${h*.9} L${w*.2},${h*.9} Z`;
    case 'almond':  return `M${w*.5},${h*.05} Q${w*.85},${h*.4} ${w*.8},${h*.9} L${w*.2},${h*.9} Q${w*.15},${h*.4} ${w*.5},${h*.05} Z`;
    case 'square':  return `M${w*.15},${h*.2} L${w*.85},${h*.2} L${w*.85},${h*.9} L${w*.15},${h*.9} Z`;
    case 'ballerina': return `M${w*.5},${h*.08} Q${w*.8},${h*.3} ${w*.75},${h*.9} L${w*.25},${h*.9} Q${w*.2},${h*.3} ${w*.5},${h*.08} Z`;
    case 'pointy':  return `M${w*.5},${h*.02} L${w*.82},${h*.9} L${w*.18},${h*.9} Z`;
    default:        return `M${w*.2},${h*.5} Q${w*.2},${h*.1} ${w*.5},${h*.1} Q${w*.8},${h*.1} ${w*.8},${h*.5} L${w*.8},${h*.9} L${w*.2},${h*.9} Z`;
  }
}

function svgNail(shape, fill, stroke='rgba(255,255,255,.4)', extra='', w=65, h=90) {
  return `<svg class="nail-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <path d="${nailPath(shape,w,h)}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
    ${extra}
  </svg>`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function buildProgress() {
  const bar = document.getElementById('progress-bar');
  bar.innerHTML = '';
  THEMES.forEach((t, i) => {
    const pill = document.createElement('div');
    pill.className = 'pill' + (i===currentTheme?' active':i<currentTheme?' done':'');
    pill.innerHTML = `${t.emoji} ${t.label}`;

function showTheme(idx) {
  currentTheme = idx;
  const theme = THEMES[idx];
  buildProgress();

  // title
  const h2 = document.getElementById('theme-h2');
  const sub = document.getElementById('theme-sub');
  h2.classList.remove('show'); sub.classList.remove('show');
  setTimeout(() => {
    h2.textContent = theme.emoji + ' ' + theme.label;
    sub.textContent = theme.subtitle;
    h2.classList.add('show'); sub.classList.add('show');
  }, 100);

  // cards
  const zone = document.getElementById('cards-zone');
  zone.innerHTML = '';
  document.getElementById('next-btn').classList.remove('visible');

  if (!theme.single) {
    decoCount = Math.floor(Math.random()*2)+2; // 2 or 3
  }

  const shuffled = shuffle(theme.cards);
  shuffled.forEach((card, ci) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.style.animationDelay = ci*0.06+'s';

    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-back">${cardBackSVG()}</div>
        <div class="card-front" style="${gradStyle(card.bg)}">
          <div class="card-visual"></div>
          <div class="card-label">${card.label}</div>
        </div>
      </div>`;

    // draw visual
    setTimeout(() => {
      const vis = wrap.querySelector('.card-visual');
      card.draw(vis, card);
    }, 50);

    wrap.addEventListener('click', () => onCardClick(wrap, card, theme));
    zone.appendChild(wrap);
  });
}

function onCardClick(wrap, card, theme) {
  if (wrap.classList.contains('locked')) return;

  const zone = document.getElementById('cards-zone');
  const allCards = zone.querySelectorAll('.card-wrap');
  const nextBtn = document.getElementById('next-btn');

  if (theme.single) {
    // deselect all, select clicked
    allCards.forEach(c => {
      c.classList.remove('selected');
      if (!c.isSameNode(wrap)) {
        c.classList.add('locked');
        if (c.classList.contains('flipped')) c.classList.remove('flipped');
      }
    });
    wrap.classList.add('flipped', 'selected');
    selectedCards[theme.id] = [card];
    nextBtn.classList.add('visible');
  } else {
    // multi-select up to decoCount — flipped cards always stay flipped
    const cur = selectedCards[theme.id] || [];

    if (wrap.classList.contains('selected')) {
      // Désélectionner : retire le glow mais la carte reste retournée
      wrap.classList.remove('selected');
      selectedCards[theme.id] = cur.filter(c => c.label !== card.label);
    } else {
      // Sélectionner seulement si quota non atteint
      if (cur.length >= decoCount) return;
      wrap.classList.add('flipped', 'selected');
      selectedCards[theme.id] = [...cur, card];
    }

    if ((selectedCards[theme.id] || []).length >= decoCount) {
      nextBtn.classList.add('visible');
    } else {
      nextBtn.classList.remove('visible');
    }
  }
}

        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const raw = (data.content || []).map(b => b.text || '').join('');
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('no json');
    const proposal = JSON.parse(match[0]);

    const stepsHTML = (proposal.etapes || []).map((s, i) =>
      `<div class="proposal-step">
        <span class="step-num">${i+1}.</span>
        <span class="step-text">${s}</span>
      </div>`
    ).join('');

    const tipsHTML = (proposal.conseils || []).map(t =>
      `<span class="tip-pill">✦ ${t}</span>`
    ).join('');

    content.innerHTML = `<div class="proposal-body">
      <div>
        <div class="proposal-name">${proposal.nom}</div>
        <div class="proposal-desc">${proposal.description}</div>
      </div>
      <div class="proposal-steps">${stepsHTML}</div>
      <div class="proposal-tips">${tipsHTML}</div>
    </div>`;

  } catch(e) {
    content.innerHTML = `<div class="proposal-error">😔 Impossible de générer la proposition.<br>Vérifie ta connexion et réessaie.</div>`;
  }
}

function showResult() {
  document.getElementById('cards-zone').style.display = 'none';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('theme-title').style.display = 'none';
  document.getElementById('progress-bar').style.display = 'none';

  const screen = document.getElementById('result-screen');
  screen.style.display = 'block';

  const grid = document.getElementById('result-grid');
  grid.innerHTML = '';

  const colors = ['#ff6eb4','#c084fc','#60a5fa','#34d399','#f97316','#f59e0b'];

  THEMES.forEach((theme, ti) => {
    const cards = selectedCards[theme.id] || [];
    cards.forEach((card, ci) => {
      const div = document.createElement('div');
      div.className = 'result-card';
      div.style.borderColor = colors[(ti+ci)%colors.length];
      div.style.animationDelay = (ti*cards.length+ci)*0.1+'s';
      div.innerHTML = `<span class="rc-emoji">${card.emoji}</span>
        <span><span class="rc-label">${theme.label}</span>${card.label}</span>`;
      grid.appendChild(div);
    });
  });

  confettiBurst();
}


function restart() {
  selectedCards = {};
  currentTheme = 0;
  document.getElementById('cards-zone').style.display = 'flex';
  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('theme-title').style.display = 'block';
  document.getElementById('progress-bar').style.display = 'flex';
  document.getElementById('result-screen').style.display = 'none';
  showTheme(0);
}

function confettiBurst() {
  const colors = ['#ff6eb4','#c084fc','#6ee7b7','#fbbf24','#60a5fa','#f97316'];
  for (let i=0; i<60; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `
        left:${Math.random()*100}vw;
        top:0;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        transform:rotate(${Math.random()*360}deg);
        border-radius:${Math.random()>.5?'50%':'2px'};
        animation-duration:${1.2+Math.random()*.8}s;
        animation-delay:${Math.random()*.5}s;
      `;
      document.body.appendChild(c);
      setTimeout(()=>c.remove(),2500);
    }, i*25);
  }
}

function openAdmin() {
  // Deep clone THEMES into adminData (keep only serialisable fields)
  adminData = THEMES.map(t => ({
    id: t.id,
    label: t.label,
    emoji: t.emoji,
    subtitle: t.subtitle,
    single: t.single,
    cards: t.cards.map(c => ({
      label: c.label,
      emoji: c.emoji,
      bg: [...(c.bg||['#fce7f3','#fbcfe8'])],
      colors: c.colors ? [...c.colors] : undefined,
      draw: c.draw // keep ref for now
    }))
  }));
  renderAdmin();
  document.getElementById('admin-overlay').classList.add('open');
  document.getElementById('admin-panel').classList.add('open');
}

function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
  document.getElementById('admin-panel').classList.remove('open');
  closeEmojiPicker();
}

function renderAdmin() {
  const list = document.getElementById('admin-cats-list');
  list.innerHTML = '';
  adminData.forEach((cat, ci) => {
    const block = document.createElement('div');
    block.className = 'admin-cat';

    block.innerHTML = `
      <div class="admin-cat-header" onclick="toggleCat(${ci})">
        <button class="admin-emoji-btn" onclick="event.stopPropagation();openEmojiPicker(event,'cat',${ci},-1)">${cat.emoji}</button>
        <input class="admin-cat-name" value="${cat.label}" placeholder="Nom de la catégorie"
          onclick="event.stopPropagation()"
          oninput="adminData[${ci}].label=this.value"/>
        <span class="admin-cat-toggle" id="toggle-${ci}">▾</span>
        <button class="admin-cat-del" onclick="event.stopPropagation();adminDelCat(${ci})" title="Supprimer">🗑️</button>
      </div>
      <div class="admin-cat-body" id="catbody-${ci}">
        ${cat.cards.map((card, ki) => `
          <div class="admin-card-row" id="cardrow-${ci}-${ki}">
            <button class="admin-card-emoji" onclick="openEmojiPicker(event,'card',${ci},${ki})">${card.emoji}</button>
            <input class="admin-card-label" value="${card.label}" placeholder="Nom de la carte"
              oninput="adminData[${ci}].cards[${ki}].label=this.value"/>
            <button class="admin-card-del" onclick="adminDelCard(${ci},${ki})" title="Supprimer">✕</button>
          </div>`).join('')}
        <button class="admin-add-card" onclick="adminAddCard(${ci})">＋ Ajouter une carte</button>

    list.appendChild(block);
  });
}

function toggleCat(ci) {
  const body = document.getElementById('catbody-' + ci);
  const tog  = document.getElementById('toggle-' + ci);
  body.classList.toggle('collapsed');
  tog.textContent = body.classList.contains('collapsed') ? '▸' : '▾';
}

function adminDelCat(ci) {
  const btn = document.querySelector(`#admin-cats-list .admin-cat:nth-child(${ci+1}) .admin-cat-del`);
  if (btn && btn.dataset.confirm !== 'yes') {
    btn.dataset.confirm = 'yes';
    btn.textContent = '✓ Confirmer';
    btn.style.background = '#fee2e2';
    btn.style.color = '#dc2626';
    btn.style.borderRadius = '8px';
    btn.style.padding = '.2rem .5rem';
    setTimeout(() => {
      if (btn.dataset.confirm === 'yes') {
        btn.dataset.confirm = '';
        btn.textContent = '🗑️';
        btn.style = '';
      }
    }, 2500);
    return;
  }
  adminData.splice(ci, 1);
  renderAdmin();
}

function adminDelCard(ci, ki) {
  adminData[ci].cards.splice(ki, 1);
  renderAdmin();
}

function adminAddCard(ci) {
  adminData[ci].cards.push({ label: 'Nouvelle carte', emoji: '💅', bg: ['#fce7f3','#fbcfe8'], draw: drawUni });
  renderAdmin();
  // scroll to new card
  const body = document.getElementById('catbody-' + ci);
  if (body) body.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function adminAddCategory() {
  adminData.push({
    id: 'cat_' + Date.now(),
    label: 'Nouvelle catégorie',
    emoji: '✨',
    subtitle: 'Faites votre choix',
    single: true,
    cards: [{ label: 'Option 1', emoji: '💅', bg: ['#fce7f3','#fbcfe8'], draw: drawUni }]
  });
  renderAdmin();
  // open it and scroll to it
  const newIdx = adminData.length - 1;
  const list = document.getElementById('admin-cats-list');
  list.lastElementChild?.scrollIntoView({ behavior: 'smooth' });
}

function adminSave() {
  // Merge adminData back into THEMES
  THEMES.length = 0;
  adminData.forEach(cat => {
    THEMES.push({
      ...cat,
      cards: cat.cards.map(c => ({
        ...c,
        draw: c.draw || drawUni
      }))
    });
  });
  // Sauvegarde dans localStorage
  saveThemesToStorage();
  showSavedToast();
  closeAdmin();
  restart();
}

function showSavedToast() {
  const badge = document.createElement('div');
  badge.className = 'storage-badge';
  badge.textContent = '✓ Paramètres sauvegardés !';
  document.body.appendChild(badge);
  setTimeout(() => badge.remove(), 2200);
}

function adminReset() {
  resetStorage();
  location.reload();
}

// ─── EMOJI PICKER ────────────────────────────────────────────────────────────
let filteredEmojis = [...ALL_EMOJIS];

function openEmojiPicker(event, type, ci, ki) {
  event.stopPropagation();
  emojiTarget = { type, ci, ki };
  const picker = document.getElementById('emoji-picker');
  picker.classList.add('open');
  document.getElementById('emoji-search').value = '';
  filteredEmojis = [...ALL_EMOJIS];
  renderEmojiGrid();

  // Position near the clicked button
  const rect = event.target.getBoundingClientRect();
  const pickerW = 260, pickerH = 260;
  let top = rect.bottom + 6;
  let left = rect.left;
  if (left + pickerW > window.innerWidth) left = window.innerWidth - pickerW - 8;
  if (top + pickerH > window.innerHeight) top = rect.top - pickerH - 6;
  picker.style.top = top + 'px';
  picker.style.left = left + 'px';

  setTimeout(() => document.addEventListener('click', closeEmojiOnOutside), 10);
}

function closeEmojiOnOutside(e) {
  const picker = document.getElementById('emoji-picker');
  if (!picker.contains(e.target)) {
    closeEmojiPicker();
    document.removeEventListener('click', closeEmojiOnOutside);
  }
}

function closeEmojiPicker() {
  document.getElementById('emoji-picker').classList.remove('open');
  document.removeEventListener('click', closeEmojiOnOutside);
}

function renderEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  filteredEmojis.forEach(em => {
    const btn = document.createElement('button');
    btn.className = 'eopt';
    btn.textContent = em;
    btn.onclick = (e) => { e.stopPropagation(); selectEmoji(em); };
    grid.appendChild(btn);
  });
}

function filterEmoji(q) {
  filteredEmojis = q ? ALL_EMOJIS.filter(e => e.includes(q)) : [...ALL_EMOJIS];
  renderEmojiGrid();
}

function selectEmoji(em) {
  if (!emojiTarget) return;
  const { type, ci, ki } = emojiTarget;
  if (type === 'cat') {
    adminData[ci].emoji = em;
  } else {
    adminData[ci].cards[ki].emoji = em;
  }
  closeEmojiPicker();
  renderAdmin();
}

// ─── PERSISTANCE localStorage ────────────────────────────────────────────────
const STORAGE_KEY = 'randomnails_themes_v1';

function saveThemesToStorage() {
  // On sérialise uniquement les champs éditables (pas les fonctions draw)
  const serialisable = THEMES.map(t => ({
    id:       t.id,
    label:    t.label,
    emoji:    t.emoji,
    subtitle: t.subtitle,
    single:   t.single,
    cards: t.cards.map(c => ({
      label:  c.label,
      emoji:  c.emoji,
      bg:     c.bg,
      colors: c.colors || null
    }))
  }));
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(serialisable));
  } catch(e) {
    console.warn('Impossible de sauvegarder dans localStorage', e);
  }
}

function loadThemesFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    if (!Array.isArray(saved) || saved.length === 0) return false;

    // Réassociation des fonctions draw à partir du label de la carte
    const drawMap = buildDrawMap();

    THEMES.length = 0;
    saved.forEach(t => {
      THEMES.push({
        ...t,
        cards: t.cards.map(c => ({
          ...c,
          bg:     c.bg     || ['#fce7f3','#fbcfe8'],
          colors: c.colors || undefined,
          draw:   drawMap[c.label] || drawMap['__default__']
        }))
      });
    });
    return true;
  } catch(e) {
    console.warn('Erreur lors du chargement depuis localStorage', e);
    return false;
  }
}

function buildDrawMap() {
  // Map label → fonction draw pour la réassociation après désérialisation
  return {
    // Longueur
    'Court':          drawCourt,
    'Moyen':          drawMoyen,
    'Long':           drawLong,
    // Forme
    'Amande':         drawAmande,
    'Rond':           drawRond,
    'Carré':          drawCarre,
    'Ballerine':      drawBallerine,
    'Pointu':         drawPointu,
    // Couleurs
    'Rouge':          drawColorNail,
    'Rose':           drawColorNail,
    'Bleu':           drawColorNail,
    'Vert':           drawColorNail,
    'Violet':         drawColorNail,
    'Nude':           drawColorNail,
    'Noir':           drawColorNail,
    'Blanc':          drawColorNail,
    // Intensité
    'Clair':          drawClair,
    'Foncé':          drawFonce,
    'Flashy':         drawFlashy,
    // Finition
    'Chrome':         drawChrome,
    'Irisé':          drawIrise,
    'Uni':            drawUni,
    'Brillant':       drawBrillant,
    'Mat':            drawMat,
    'Holographique':  drawHolo,
    // Décorations
    'Strass':         drawStrass,
    'Perles':         drawPerles,
    'Fleurs':         drawFleurs,
    'Étoiles':        drawEtoiles,
    'Marbré':         drawMarbre,
    'Léopard':        drawLeopard,
    'French':         drawFrench,
    'Dégradé':        drawDegrade,
    // Défaut pour les cartes créées en admin
    '__default__':    drawUni
  };
}

function resetStorage() {
  localStorage.removeItem(STORAGE_KEY);
}
